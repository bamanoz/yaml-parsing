services:
  tabula:
    build:
      context: ../tabula
      dockerfile: Dockerfile
    image: tabula-agent:local
    init: true
    ports:
      - "28089:8089"
      - "28765:8765"
    environment:
      TABULA_HOME: /workspace/.tabula
      TABULA_WORKSPACE: /workspace
      TABULA_APP_MANIFEST: /workspace/tabula.app.toml
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
