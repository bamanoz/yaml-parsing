services:
  tabula:
    build:
      context: ../tabula
      dockerfile: Dockerfile
    image: tabula-agent:local
    init: true
    ports:
      - "28089:8089"
      - "28765:8765"
    environment:
      TABULA_HOME: /workspace/.tabula
      TABULA_WORKSPACE: /workspace
      TABULA_APP_MANIFEST: /workspace/tabula.app.toml
      TABULA_UID: ${UID:-1000}
      TABULA_GID: ${GID:-1000}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - .:/workspace
      - ~/.ssh:/host-ssh:ro
